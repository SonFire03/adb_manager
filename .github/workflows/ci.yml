name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff black

      - name: Compile check
        run: |
          python -m py_compile main.py
          python -m py_compile core/adb_manager.py core/commands.py core/device_manager.py core/utils.py
          python -m py_compile modules/app_manager.py modules/system_info.py modules/automation.py modules/backup_restore.py modules/device_inspector.py modules/device_profiles.py modules/health_check.py modules/session_audit.py modules/snapshot_compare.py
          python -m py_compile gui/main_window.py gui/styles.py gui/widgets/code_editor.py gui/widgets/terminal_widget.py gui/widgets/toast.py

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (format check)
        run: black --check .

      - name: Pytest
        run: |
          pytest -q --cov --cov-report=term-missing --cov-fail-under=80
          coverage report --include="core/*" --fail-under=85
          coverage report --include="modules/data_transfer.py" --fail-under=90
