name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m py_compile main.py
          python -m py_compile core/adb_manager.py core/commands.py core/device_manager.py core/utils.py
          python -m py_compile modules/app_manager.py modules/system_info.py modules/automation.py modules/backup_restore.py modules/device_inspector.py modules/device_profiles.py modules/health_check.py modules/session_audit.py modules/snapshot_compare.py
          python -m py_compile gui/main_window.py gui/styles.py gui/widgets/code_editor.py gui/widgets/terminal_widget.py gui/widgets/toast.py

      - name: Unit tests
        run: python -m unittest discover -s tests -v
